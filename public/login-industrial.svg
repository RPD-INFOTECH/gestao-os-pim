<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Industrial complex</title>
  <desc id="desc">Night view of an industrial plant with pipes, tanks and blue operational lights.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.46" stop-color="#12233a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#415063"/>
      <stop offset="0.5" stop-color="#9aa8b6"/>
      <stop offset="1" stop-color="#344153"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.95"/>
      <stop offset="0.38" stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect y="700" width="1600" height="300" fill="#060b14"/>

  <g opacity="0.9">
    <circle cx="280" cy="380" r="160" fill="url(#glow)" filter="url(#soft)"/>
    <circle cx="1120" cy="300" r="220" fill="url(#glow)" filter="url(#soft)"/>
    <circle cx="1350" cy="680" r="180" fill="url(#glow)" filter="url(#soft)"/>
  </g>

  <g fill="none" stroke="url(#steel)" stroke-width="18" stroke-linecap="round" opacity="0.72">
    <path d="M-40 640 C170 560 260 690 470 610 S820 520 1010 600 1310 720 1640 560"/>
    <path d="M80 780 H430 C520 780 540 710 620 710 H920 C1000 710 1050 650 1130 650 H1600"/>
    <path d="M-20 515 H250 C350 515 370 445 460 445 H760 C850 445 900 500 980 500 H1620"/>
  </g>

  <g opacity="0.86">
    <rect x="180" y="565" width="150" height="240" rx="10" fill="#172234"/>
    <rect x="210" y="515" width="90" height="70" rx="8" fill="#26364c"/>
    <rect x="226" y="455" width="58" height="78" rx="24" fill="#34465d"/>

    <rect x="560" y="500" width="190" height="310" rx="12" fill="#121c2d"/>
    <rect x="590" y="430" width="130" height="90" rx="12" fill="#2b3d54"/>
    <rect x="625" y="340" width="60" height="105" rx="28" fill="#46586d"/>

    <rect x="980" y="455" width="250" height="355" rx="14" fill="#111a29"/>
    <rect x="1025" y="370" width="160" height="105" rx="14" fill="#293b52"/>
    <rect x="1075" y="270" width="62" height="120" rx="28" fill="#42556b"/>

    <rect x="1330" y="590" width="130" height="220" rx="10" fill="#172234"/>
    <rect x="1355" y="530" width="80" height="80" rx="8" fill="#2c3e55"/>
  </g>

  <g stroke="#8ea3b8" stroke-width="9" opacity="0.58">
    <path d="M120 805 V460"/>
    <path d="M390 805 V410"/>
    <path d="M810 805 V360"/>
    <path d="M1280 805 V430"/>
    <path d="M70 500 H1520"/>
    <path d="M120 460 L390 410 L810 360 L1280 430 L1520 500"/>
  </g>

  <g opacity="0.95">
    <circle cx="255" cy="645" r="11" fill="#7dd3fc"/>
    <circle cx="655" cy="595" r="12" fill="#7dd3fc"/>
    <circle cx="1110" cy="560" r="14" fill="#7dd3fc"/>
    <circle cx="1395" cy="665" r="10" fill="#7dd3fc"/>
  </g>

  <g fill="#020617" opacity="0.42">
    <rect y="820" width="1600" height="180"/>
    <path d="M0 780 C260 730 390 850 610 790 C810 735 1020 740 1210 805 C1370 860 1490 820 1600 790 V1000 H0Z"/>
  </g>
</svg>
