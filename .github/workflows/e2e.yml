name: E2E Tests (Cypress)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  cypress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: gestao-os-pim

      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: patrese-ebs/servicoPim-API-Patrese
          path: servicoPim-API

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gestao-os-pim/package-lock.json

      - name: Install frontend dependencies
        working-directory: gestao-os-pim
        run: npm ci

      - name: Run Cypress E2E suite
        working-directory: gestao-os-pim
        run: bash src/scripts/test-e2e.sh
        env:
          CYPRESS_BASE_URL: http://localhost:3000
          CYPRESS_supervisor_email: supervisor@seed.local
          CYPRESS_supervisor_senha: seed123

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: gestao-os-pim/cypress/screenshots
          if-no-files-found: ignore
